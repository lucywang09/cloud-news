<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AWS Cloud News Dashboard - Real-time updates from official AWS sources">
  <meta name="keywords" content="AWS, cloud, news, updates, architecture, security">
  <meta name="author" content="AWS Cloud News">
  <title>AWS Cloud News Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☁️</text></svg>">
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">☁️</div>
      </div>
      <h1 class="site-title">AWS Cloud News</h1>
      <p class="site-subtitle">Real-time Updates from Official Sources</p>
    </div>
  </header>

  <main class="container">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">
        <span>All News <span class="count" id="count-all">0</span></span>
      </button>
      <button class="filter-btn" data-filter="What's New">
        <span>What's New <span class="count" id="count-whats-new">0</span></span>
      </button>
      <button class="filter-btn" data-filter="News Blog">
        <span>News Blog <span class="count" id="count-news-blog">0</span></span>
      </button>
      <button class="filter-btn" data-filter="Architecture Blog">
        <span>Architecture <span class="count" id="count-architecture-blog">0</span></span>
      </button>
      <button class="filter-btn" data-filter="Security Blog">
        <span>Security <span class="count" id="count-security-blog">0</span></span>
      </button>
    </div>

    <div class="news-grid" id="newsGrid">
      <div class="loading">Loading AWS news...</div>
    </div>
  </main>

  <footer class="footer">
    <div class="last-updated" id="lastUpdated">
      Loading...
    </div>
    <p>Data sourced from official AWS RSS feeds</p>
  </footer>

  <script>
    let allNewsItems = [];
    let currentFilter = 'all';

    // Fetch and render news
    async function loadNews() {
      try {
        const response = await fetch('./news.json');
        const data = await response.json();
        
        allNewsItems = data.items;
        updateLastUpdated(data.lastUpdated);
        updateCounts();
        renderNews();
      } catch (error) {
        console.error('Error loading news:', error);
        document.getElementById('newsGrid').innerHTML = '<div class="empty-state">Failed to load news. Please try again later.</div>';
      }
    }

    // Update last updated timestamp
    function updateLastUpdated(timestamp) {
      const date = new Date(timestamp);
      const formatted = date.toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
      document.getElementById('lastUpdated').innerHTML = `Last updated: ${formatted}`;
    }

    // Update counts for each filter
    function updateCounts() {
      const counts = allNewsItems.reduce((acc, item) => {
        acc[item.source] = (acc[item.source] || 0) + 1;
        return acc;
      }, {});

      document.getElementById('count-all').textContent = allNewsItems.length;
      document.getElementById('count-whats-new').textContent = counts["What's New"] || 0;
      document.getElementById('count-news-blog').textContent = counts["News Blog"] || 0;
      document.getElementById('count-architecture-blog').textContent = counts["Architecture Blog"] || 0;
      document.getElementById('count-security-blog').textContent = counts["Security Blog"] || 0;
    }

    // Get relative time (e.g., "2h ago", "3d ago")
    function getRelativeTime(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);
      const diffDays = Math.floor(diffMs / 86400000);

      if (diffMins < 60) return `${diffMins}m ago`;
      if (diffHours < 24) return `${diffHours}h ago`;
      if (diffDays < 7) return `${diffDays}d ago`;
      
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Get badge class for source
    function getBadgeClass(source) {
      const mapping = {
        "What's New": 'whats-new',
        "News Blog": 'news-blog',
        "Architecture Blog": 'architecture-blog',
        "Security Blog": 'security-blog'
      };
      return mapping[source] || 'news-blog';
    }

    // Render news cards
    function renderNews() {
      const grid = document.getElementById('newsGrid');
      const filteredItems = currentFilter === 'all' 
        ? allNewsItems 
        : allNewsItems.filter(item => item.source === currentFilter);

      if (filteredItems.length === 0) {
        grid.innerHTML = '<div class="empty-state">No news items found for this filter.</div>';
        return;
      }

      grid.innerHTML = filteredItems.map((item, index) => `
        <div class="news-card" onclick="window.open('${item.link}', '_blank')" style="animation-delay: ${index * 0.05}s">
          <div class="news-card-content">
            <span class="source-badge ${getBadgeClass(item.source)}">${item.source}</span>
            <h2 class="news-title">${item.title}</h2>
            <div class="news-date">${getRelativeTime(item.pubDate)}</div>
            <div class="external-link">↗</div>
          </div>
        </div>
      `).join('');
    }

    // Filter button handlers
    document.getElementById('filters').addEventListener('click', (e) => {
      const button = e.target.closest('.filter-btn');
      if (!button) return;

      // Update active state
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');

      // Update filter and re-render
      currentFilter = button.dataset.filter;
      renderNews();
    });

    // Initialize
    loadNews();
  </script>
</body>
</html>
